services:
  docs:
    image: ghcr.io/huguanjin/wc-new-docs:latest
    ports:
      - "3003:80"
    restart: unless-stopped

  admin:
    image: ghcr.io/huguanjin/wc-admin-server:latest
    ports:
      - "4000:4000"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - JWT_SECRET=change-me-in-production
      - ADMIN_PORT=4000
    restart: unless-stopped
